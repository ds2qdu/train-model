# ============================================================
# TrainJob: HF DistilBERT SST-2 Fine-tuning 검증
# API: trainer.kubeflow.org/v1alpha1
# ============================================================
apiVersion: trainer.kubeflow.org/v1alpha1
kind: TrainJob
metadata:
  name: hf-distilbert-sst2
  namespace: default          # 사용 중인 네임스페이스로 변경
  labels:
    app: hf-validation
    team: ai-platform
spec:
  # ----------------------------------------------------------
  # RuntimeRef: ClusterTrainingRuntime 또는 TrainingRuntime 참조
  # ----------------------------------------------------------
  runtimeRef:
    name: torch-distributed     # 미리 정의된 runtime (아래 별도 제공)

  # ----------------------------------------------------------
  # Trainer 설정
  # ----------------------------------------------------------
  trainer:
    image: 192.168.0.104:5000/hf-trainjob-validation:v1   # 로컬 레지스트리
    # image: <your-registry>/hf-trainjob-validation:v1     # 외부 레지스트리 사용 시
    command:
      - python
      - /app/train.py
    args:
      - "--model-name=distilbert-base-uncased"
      - "--output-dir=/mnt/output/checkpoints"
      - "--epochs=3"
      - "--batch-size=16"
      - "--learning-rate=2e-5"
      - "--max-samples=2000"     # 빠른 검증용 (0 = 전체 데이터)
    resourcesPerNode:
      requests:
        cpu: "4"
        memory: "8Gi"
        nvidia.com/gpu: "1"
      limits:
        cpu: "8"
        memory: "16Gi"
        nvidia.com/gpu: "1"
    numNodes: 1                 # 단일 노드 (검증 단계)

  # ----------------------------------------------------------
  # PodSpec 오버라이드: 볼륨 마운트 등
  # ----------------------------------------------------------
  podSpecOverrides:
    - targetJobs:
        - name: trainer
      containers:
        - name: trainer
          volumeMounts:
            - name: output-vol
              mountPath: /mnt/output
            - name: hf-cache-vol
              mountPath: /mnt/hf-cache
      volumes:
        - name: output-vol
          persistentVolumeClaim:
            claimName: training-output-pvc    # 체크포인트 저장용 PVC
        - name: hf-cache-vol
          persistentVolumeClaim:
            claimName: hf-cache-pvc           # HF 모델 캐시용 PVC
      # KAI Scheduler 사용 시
      schedulerName: kai-scheduler

---
# ============================================================
# PVC: 체크포인트 저장용
# ============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: training-output-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # storageClassName: <your-sc>  # 환경에 맞게 지정

---
# ============================================================
# PVC: HF 모델 캐시 (재사용 가능)
# ============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hf-cache-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  # storageClassName: <your-sc>
