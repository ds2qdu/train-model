apiVersion: trainer.kubeflow.org/v1alpha1
kind: TrainingRuntime
metadata:
  name: stock-runtime-preempt-low
  namespace: mlteam2
spec:
  mlPolicy:
    numNodes: 1
    torch:
      numProcPerNode: 1
  template:
    spec:
      replicatedJobs:
        - name: trainer
          replicas: 4
          template:
            spec:
              parallelism: 1
              completions: 1
              template:
                spec:
                  schedulerName: kai-scheduler
                  runtimeClassName: nvidia
                  priorityClassName: test-low
                  nodeSelector:
                    kubernetes.io/hostname: worker-gpu08
                  tolerations:
                    - key: "nvidia.com/gpu"
                      operator: "Equal"
                      value: "true"
                      effect: "NoSchedule"

                  initContainers:
                    - name: git-clone
                      image: alpine/git
                      command: ["sh", "-c"]
                      args:
                        - |
                          set -eux
                          git clone --depth=1 https://github.com/ds2qdu/train-model.git /workspace/repo
                          cp /workspace/repo/trainjob/mjob04-stock/train.py /workspace/train.py
                          ls -la /workspace/
                      volumeMounts:
                        - name: workspace
                          mountPath: /workspace

                  containers:
                    - name: trainer
                      image: nvcr.io/nvidia/pytorch:25.12-py3
                      command: ["bash", "-lc"]
                      args:
                        - |
                          set -eux
                          pip install --root-user-action=ignore yfinance scikit-learn transformers chromadb onnxscript pytz tensorboard

                          export WORLD_SIZE=1 RANK=0 LOCAL_RANK=0 MASTER_ADDR=localhost MASTER_PORT=29500

                          RUN_ID=${HOSTNAME}
                          mkdir -p /mnt/storage/chromadb/${RUN_ID}

                          torchrun \
                            --nnodes=1 --nproc_per_node=1 --node_rank=0 \
                            --master_addr=$MASTER_ADDR --master_port=$MASTER_PORT \
                            /workspace/train.py \
                            --epochs=50 \
                            --batch-size=32 \
                            --lr=0.0001 \
                            --seq-length=30 \
                            --pred-length=5 \
                            --d-model=256 \
                            --nhead=8 \
                            --num-layers=4 \
                            --data-dir=/mnt/storage/data \
                            --checkpoint-dir=/mnt/storage/checkpoints \
                            --export-dir=/mnt/storage/models \
                            --chromadb-dir=/mnt/storage/chromadb/${RUN_ID} \
                            --tensorboard-dir=/mnt/tensorboard
                      env:
                        - name: NCCL_DEBUG
                          value: "INFO"
                        - name: NCCL_IB_DISABLE
                          value: "1"
                        - name: NCCL_SOCKET_IFNAME
                          value: "eth0"
                        - name: NCCL_NET
                          value: "Socket"
                        - name: FINNHUB_API_KEY
                          valueFrom:
                            secretKeyRef:
                              name: finnhub-secret
                              key: api-key
                        - name: HF_HOME
                          value: "/mnt/storage/huggingface"
                        - name: TOKENIZERS_PARALLELISM
                          value: "false"
                        - name: CUDA_MPS_PIPE_DIRECTORY
                          value: /var/run/nvidia-mps
                        - name: CUDA_MPS_LOG_DIRECTORY
                          value: /var/log/nvidia-mps    
                      resources:
                        requests:
                          cpu: "4"
                          memory: "16Gi"
                          nvidia.com/gpu: "1"
                        limits:
                          cpu: "8"
                          memory: "32Gi"
                          nvidia.com/gpu: "1"
                      volumeMounts:
                        - name: shm
                          mountPath: /dev/shm
                        - name: workspace
                          mountPath: /workspace
                        - name: storage
                          mountPath: /mnt/storage
                        - name: tensorboard-volume
                          mountPath: /mnt/tensorboard
                        - name: mps-pipe
                          mountPath: /var/run/nvidia-mps
                        - name: mps-log
                          mountPath: /var/log/nvidia-mps

                  volumes:
                    - name: shm
                      emptyDir:
                        medium: Memory
                        sizeLimit: 8Gi
                    - name: workspace
                      emptyDir: {}
                    - name: storage
                      persistentVolumeClaim:
                        claimName: stock-pipeline-storage
                    - name: tensorboard-volume
                      persistentVolumeClaim:
                        claimName: stock-tensorboard-storage
                    - name: mps-pipe
                      hostPath:
                        path: /var/run/nvidia-mps
                        type: DirectoryOrCreate
                    - name: mps-log
                      hostPath:
                        path: /var/log/nvidia-mps
                        type: DirectoryOrCreate

                  restartPolicy: OnFailure
