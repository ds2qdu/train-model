---
apiVersion: trainer.kubeflow.org/v1alpha1
kind: TrainingRuntime
metadata:
  name: stock-runtime-share
  namespace: mlteam
spec:
  mlPolicy:
    numNodes: 1
    torch:
      numProcPerNode: auto
  template:
    spec:
      replicatedJobs:
        - name: trainer
          replicas: 1
          template:
            spec:
              parallelism: 1
              completions: 1
              template:
                metadata:
                  annotations:
                    gpu-fraction: "0.5"
                    # 여기에 fraction명시
                spec:
                  schedulerName: kai-scheduler
                  # 스케줄러 지정
                  runtimeClassName: nvidia
                  nodeSelector:
                    kubernetes.io/hostname: worker-gpu04
                  tolerations:
                    - key: "nvidia.com/gpu"
                      operator: "Equal"
                      value: "true"
                      effect: "NoSchedule"
                  initContainers:
                    - name: git-clone
                      image: alpine/git
                      command:
                        - sh
                        - -c
                        - |
                          git clone --depth=1 https://github.com/ds2qdu/train-model.git /workspace/repo
                          cp /workspace/repo/trainjob/mjob04-stock/train.py /workspace/train.py
                          echo "Git clone completed"
                          ls -la /workspace/
                      volumeMounts:
                        - name: workspace
                          mountPath: /workspace
                  containers:
                    - name: trainer
                      image: nvcr.io/nvidia/pytorch:25.12-py3
                      command:
                        - bash
                        - -c
                        - |
                          echo "=== Installing dependencies ==="
                          pip install --root-user-action=ignore yfinance scikit-learn transformers chromadb onnxscript pytz tensorboard
                          echo "=== Dependencies installed successfully ==="

                          export WORLD_SIZE=1
                          export RANK=0
                          export MASTER_PORT=29500
                          export LOCAL_RANK=0
                          export MASTER_ADDR=localhost

                          echo "=== Environment ==="
                          echo "WORLD_SIZE=$WORLD_SIZE"
                          echo "RANK=$RANK"
                          echo "MASTER_ADDR=$MASTER_ADDR"
                          echo "MASTER_PORT=$MASTER_PORT"

                          torchrun \
                            --nnodes=1 \
                            --nproc_per_node=1 \
                            --node_rank=0 \
                            --master_addr=localhost \
                            --master_port=$MASTER_PORT \
                            /workspace/train.py \
                            --epochs=100 \
                            --batch-size=32 \
                            --lr=0.0001 \
                            --seq-length=30 \
                            --pred-length=5 \
                            --d-model=256 \
                            --nhead=8 \
                            --num-layers=4 \
                            --data-dir=/mnt/storage/data \
                            --checkpoint-dir=/mnt/storage/checkpoints \
                            --export-dir=/mnt/storage/models \
                            --chromadb-dir=/mnt/storage/chromadb \
                            --tensorboard-dir=/mnt/tensorboard
                      env:
                        - name: NCCL_DEBUG
                          value: "INFO"
                        - name: NCCL_IB_DISABLE
                          value: "1"
                        - name: NCCL_SOCKET_IFNAME
                          value: "eth0"
                        - name: NCCL_NET
                          value: "Socket"
                        - name: FINNHUB_API_KEY
                          valueFrom:
                            secretKeyRef:
                              name: finnhub-secret
                              key: api-key
                        - name: HF_HOME
                          value: "/mnt/storage/huggingface"
                        - name: TOKENIZERS_PARALLELISM
                          value: "false"
                        - name: PIP_USE_FEATURE
                          value: "build-constraint"
                      resources:
                        requests:
                          cpu: "4"
                          memory: "8Gi"
                        limits:
                          cpu: "8"
                          memory: "16Gi"
                      volumeMounts:
                        - name: shm
                          mountPath: /dev/shm
                        - name: workspace
                          mountPath: /workspace
                        - name: storage
                          mountPath: /mnt/storage
                        - name: tensorboard-volume
                          mountPath: /mnt/tensorboard
                  volumes:
                    - name: shm
                      emptyDir:
                        medium: Memory
                        sizeLimit: 8Gi
                    - name: workspace
                      emptyDir: {}
                    - name: storage
                      persistentVolumeClaim:
                        claimName: stock-pipeline-storage
                    - name: tensorboard-volume
                      persistentVolumeClaim:
                        claimName: stock-tensorboard-storage
                  restartPolicy: OnFailure