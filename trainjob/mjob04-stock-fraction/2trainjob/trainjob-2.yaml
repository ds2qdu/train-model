apiVersion: trainer.kubeflow.org/v1alpha1
kind: TrainJob
metadata:
  name: stock-training-2
  namespace: mlteam
  annotations:
    kai.scheduler/queue: "mlteam-queue"
spec:
  runtimeRef:
    name: stock-runtime-share
    kind: TrainingRuntime
    apiGroup: trainer.kubeflow.org
  trainer:
    image: nvcr.io/nvidia/pytorch:25.12-py3
    numNodes: 1
    numProcPerNode: 1
    resourcesPerNode:
      requests:
        cpu: "4"
        memory: "8Gi"
      limits:
        cpu: "8"
        memory: "16Gi"
