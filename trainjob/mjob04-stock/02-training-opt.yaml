---
apiVersion: trainer.kubeflow.org/v1alpha1
kind: TrainingRuntime
metadata:
  name: stock-runtime
  namespace: mlteam
spec:
  mlPolicy:
    numNodes: 2
    torch:
      numProcPerNode: auto
  template:
    spec:
      replicatedJobs:
        - name: trainer
          replicas: 1
          template:
            spec:
              parallelism: 2
              completions: 2
              template:
                spec:
                  schedulerName: kai-scheduler
                  containers:
                    - name: trainer
                      image: nvcr.io/nvidia/pytorch:25.12-py3
                      command:
                        - bash
                        - |
                          git clone --depth=1 https://github.com/ds2qdu/train-model.git /tmp/repo
                          cp /tmp/repo/trainjob/mjob04-stock/train.py /workspace/train.py
                          cp /tmp/repo/trainjob/mjob04-stock/env.sh /workspace/env.sh
                          chmod +x /workspace/env.sh
                          /workspace/env.sh
                      env:
                        - name: NCCL_DEBUG
                          value: "INFO"
                        - name: NCCL_IB_DISABLE
                          value: "1"
                        - name: NCCL_SOCKET_IFNAME
                          value: "eth0"
                        - name: NCCL_NET
                          value: "Socket"
                        - name: FINNHUB_API_KEY
                          valueFrom:
                            secretKeyRef:
                              name: finnhub-secret
                              key: api-key
                        - name: HF_HOME
                          value: "/mnt/storage/huggingface"
                        - name: TOKENIZERS_PARALLELISM
                          value: "false"
                        - name: PIP_USE_FEATURE
                          value: "build-constraint"
                      resources:
                        requests:
                          cpu: "4"
                          memory: "16Gi"
                          nvidia.com/gpu: "1"
                        limits:
                          cpu: "8"
                          memory: "32Gi"
                          nvidia.com/gpu: "1"
                      volumeMounts:
                        - name: shm
                          mountPath: /dev/shm
                        - name: workspace
                          mountPath: /workspace
                        - name: storage
                          mountPath: /mnt/storage
                        - name: tensorboard-volume
                          mountPath: /mnt/tensorboard
                  volumes:
                    - name: shm
                      emptyDir:
                        medium: Memory
                        sizeLimit: 8Gi
                    - name: workspace
                      emptyDir: {}
                    - name: storage
                      persistentVolumeClaim:
                        claimName: stock-pipeline-storage
                    - name: tensorboard-volume
                      persistentVolumeClaim:
                        claimName: stock-tensorboard-storage
                  restartPolicy: OnFailure
---
apiVersion: trainer.kubeflow.org/v1alpha1
kind: TrainJob
metadata:
  name: stock-training-tensorboard
  namespace: mlteam
  annotations:
    kai.scheduler/queue: "mlteam-queue"
spec:
  runtimeRef:
    name: stock-runtime
    kind: TrainingRuntime
    apiGroup: trainer.kubeflow.org
  podTemplateOverrides:
    - targetJobs:
        - name: trainer
      spec:
        tolerations:
          - key: "nvidia.com/gpu"
            operator: "Equal"
            value: "true"
            effect: "NoSchedule"
