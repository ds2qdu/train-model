---
apiVersion: v1
kind: Namespace
metadata:
  name: mlteam
---
apiVersion: v1
kind: Service
metadata:
  name: diffusion-training
  namespace: mlteam
spec:
  clusterIP: None
  selector:
    jobset.sigs.k8s.io/jobset-name: diffusion-training
  ports:
    - name: rendezvous
      port: 29500
      targetPort: 29500
---
# KAI Scheduler Queue 설정
apiVersion: scheduling.run.ai/v2
kind: Queue
metadata:
  name: mlteam-queue
spec:
  resources:
    gpu:
      quota: 2        # 이 팀에 할당된 GPU 수
      limit: 2
      overQuotaWeight: 1
